<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante Gourmet - Sistema de Gestión</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet" />

    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header class="py-5 text-center text-white header-bg">
      <div class="container">
        <h1 class="display-4 fw-bold">L' Olive RestoBar</h1>
        <p class="lead text-muted-custom">Experiencia Gastronómica Exclusiva</p>
      </div>
    </header>

    <main class="container my-5">
      <div class="row g-5">

        <section class="col-lg-7">
          <h2 class="mb-4 section-title">Nuestro Menú</h2>

          <div class="d-flex flex-wrap gap-2 mb-4" id="contenedor-filtros">
            <button class="btn btn-filtro active" id="btn-todos">Todos</button>
            <button class="btn btn-filtro" id="btn-entradas">Entradas</button>
            <button class="btn btn-filtro" id="btn-fuertes">Platos
              Fuertes</button>
            <button class="btn btn-filtro" id="btn-postres">Postres</button>
          </div>

          <div class="row row-cols-1 row-cols-md-2 g-4" id="contenedor-menu">
          </div>
        </section>

        <section class="col-lg-5">
          <div class="card p-4 shadow-sm container-formulario">
            <h2 class="mb-4 section-title-sm">Reservar una Mesa</h2>

            <form id="form-reserva" novalidate>
              <div class="mb-3">
                <label for="nombre" class="form-label fw-semibold">Nombre
                  Completo</label>
                <input type="text" id="nombre" class="form-control"
                  placeholder="Nombre">
                <div id="error-nombre" class="error-campo"></div>
              </div>

              <div class="mb-3">
                <label for="correo" class="form-label fw-semibold">Correo
                  Electrónico</label>
                <input type="email" id="correo" class="form-control"
                  placeholder="correo@ejemplo.com">
                <div id="error-correo" class="error-campo"></div>
              </div>

              <div class="mb-3">
                <label for="fecha" class="form-label fw-semibold">Fecha de
                  Reserva</label>
                <input type="date" id="fecha" class="form-control">
                <div id="error-fecha" class="error-campo"></div>
              </div>

              <div class="mb-3">
                <label for="hora" class="form-label fw-semibold">Hora
                  Seleccionada</label>
                <select id="hora" class="form-select">
                  <option value="12:00">12:00</option>
                  <option value="13:00">13:00</option>
                  <option value="18:00">18:00</option>
                  <option value="19:00">19:00</option>
                  <option value="20:00">20:00</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="personas" class="form-label fw-semibold">Número de
                  Personas</label>
                <input type="number" id="personas" class="form-control" min="1"
                  max="20" placeholder="1 a 20 personas">
                <div id="error-personas" class="error-campo"></div>
              </div>

              <div class="mb-3">
                <label for="comentarios"
                  class="form-label fw-semibold">Comentarios / Notas
                  Especiales</label>
                <textarea id="comentarios" class="form-control" rows="3"
                  placeholder="Alergias, preferencia de mesa, etc."></textarea>
              </div>

              <button type="submit" id="btn-submit"
                class="btn btn-submit-custom w-100 py-2 fw-bold" disabled>
                Confirmar Reserva
              </button>
            </form>
          </div>
        </section>
      </div>

      <div class="row mt-5">
        <div class="col-12">
          <hr class="my-5">
          <h2 class="mb-4 section-title">Listado de Reservas Activas</h2>

          <div class="table-responsive shadow-sm rounded">
            <table class="table align-middle mb-0 background-table">
              <thead>
                <tr>
                  <th scope="col"
                    class="px-4 py-3 text-white bg-dark-custom">Nombre</th>
                  <th scope="col"
                    class="py-3 text-white bg-dark-custom">Correo</th>
                  <th scope="col"
                    class="py-3 text-white bg-dark-custom">Fecha</th>
                  <th scope="col"
                    class="py-3 text-white bg-dark-custom">Hora</th>
                  <th scope="col"
                    class="py-3 text-white bg-dark-custom text-center">Personas</th>
                </tr>
              </thead>
              <tbody id="lista-reservas">
                <tr id="sin-reservas">
                  <td colspan="5" class="text-center py-4 text-muted">No hay
                    reservas registradas por el momento.</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="resumen" class="resumen-reservas mt-4 p-4 shadow-sm rounded">
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center py-4 bg-dark text-white-50 mt-5">
      <div class="container">
        <small>&copy; 2026 - Universidad Fidélitas | Ingeniería en Sistemas de
          Computación</small>
      </div>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
